# Render Blueprint - WhosRunningUSA
# https://render.com/docs/blueprint-spec

databases:
  - name: whosrunningusa-db
    plan: starter
    databaseName: whosrunningusa
    postgresMajorVersion: 16

  - name: whosrunningusa-staging-db
    plan: starter
    databaseName: whosrunningusa_staging
    postgresMajorVersion: 16

services:
  # Backend API
  - type: web
    name: whosrunningusa-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: node scripts/migrate.js && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: whosrunningusa-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://whosrunningusa.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        value: noreply@whosrunningusa.com
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET
        sync: false
      - key: OPEN_STATES_API_KEY
        sync: false
      - key: FEC_API_KEY
        sync: false
      - key: CONGRESS_GOV_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # Frontend Static Site
  - type: web
    name: whosrunningusa
    runtime: static
    buildCommand: npm install && VITE_API_URL=$VITE_API_URL npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://whosrunningusa-api.onrender.com https://plausible.io"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://whosrunningusa-api.onrender.com/api

  # =========================================
  # STAGING ENVIRONMENT
  # =========================================

  # Staging Backend API
  - type: web
    name: whosrunningusa-staging-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: node scripts/migrate.js && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: whosrunningusa-staging-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://whosrunningusa-staging.onrender.com
      - key: FROM_EMAIL
        value: noreply@whosrunningusa.com

  # Staging Frontend
  - type: web
    name: whosrunningusa-staging
    runtime: static
    buildCommand: npm install && VITE_API_URL=$VITE_API_URL npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://whosrunningusa-staging-api.onrender.com/api
